<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fix LocalStorage Encoding</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
button { padding: 10px 20px; margin: 5px; cursor: pointer; }
.success { color: green; }
.error { color: red; }
pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
</style>
</head>
<body>
<h1>Fix LocalStorage Emoji Encoding</h1>
<p>This script fixes corrupted emoji characters (like "Г°ЕёВҸ ") in saved projects.</p>

<button onclick="fixLocalStorage()">Fix All Projects in localStorage</button>
<button onclick="showProjects()">Show Current Projects</button>
<button onclick="clearAll()">Clear All Projects (WARNING!)</button>

<div id="output"></div>

<script>
// Emoji fix mapping - corrupted UTF-8 interpreted as Latin-1 вҶ’ correct Unicode
const EMOJI_FIXES = {
  'Г°ЕёВҚВі': 'рҹҚі',
  'Г°ЕёвҖәВҸ': 'рҹӣҸпёҸ',
  'Г°ЕёВҚВҪ': 'рҹҚҪпёҸ',
  'Г°ЕёВҸ ': 'рҹҸ ',
  'Г°ЕёвҖңВҒ': 'рҹ“Ғ',
  'Г°ЕёВҗвҖә': 'рҹҗӣ',
  'Г°ЕёвҖ”вҖңГҜВёВҸ': 'рҹ”Ё',
  'Г°ЕёВҸвҖ”ГҜВёВҸ': 'рҹҸ ',
  'Г°ЕёвҖәВЎГҜВёВҸ': 'рҹӣЎпёҸ',
  'Г°ЕёвҖңВҗ': 'рҹ“‘',
  'Г°ЕёВҸВӯ': 'рҹҸӯ',
  'Г°ЕёЕҪВҒ': 'рҹҺҒ',
  'Г°ЕёВҸвҖ ': 'рҹҸҶ',
  'Г°ЕёвҖқВј': 'рҹ’ј',
  'Г°ЕёвҖәвҖ№': 'рҹӣӢпёҸ',
  'Г°Её ВҪ': 'рҹҚҪпёҸ',
  'Г°ЕёВҘвҖҡ': 'рҹҘӮ',
  'Г°ЕёВ«В§': 'рҹ‘ҳ',
  'Г°ЕёВӘЕ“': 'рҹ§—',
  'Г°ЕёЕЎВӘ': 'рҹҡӘ',
  'Г°Её Ві': 'рҹ§‘вҖҚрҹҚі',
  'Г°Её В ': 'рҹҸ ',
  'Г°Её вҖә': 'рҹҗӣ',
  'Г°ЕёвҖҷВ°': 'рҹ’°',
  'Г°ЕёВӘВө': 'рҹ’—',
  'Г°ЕёвҖҷВі': 'рҹ’і',
  'Г°ЕёвҖңвҖҰ': 'рҹ““',
  'Г°Её вҖ ': 'рҹҸҶ',
  'Г°ЕёвҖңВҰ': 'рҹ“Ұ',
  'Г°ЕёЕҪ ': 'рҹҺҒ',
  'Г°ЕёвҖң ': 'рҹ“Ҹ',
  'Г°Её Вӯ': 'рҹҸӯ',
  'Г°ЕёвҖ”вҖңГҜВё ': 'рҹ”Ё',
  'Г°ЕёвҖңвҖ№': 'рҹ“Ӣ',
  'Г°ЕёвҖ”вҖңГҜВё ': 'рҹ“…',
  'Г°ЕёвҖҳВҘ': 'рҹ‘Ҙ',
  'Г°ЕёвҖә ': 'рҹӣҢ',
  'Г°ЕёвҖҳвҖқ': 'рҹ‘”',
  'Г°ЕёЕЎВҝ': 'рҹӣҒ',
};

function fixString(str) {
  if (typeof str !== 'string') return str;
  let fixed = str;
  for (const [bad, good] of Object.entries(EMOJI_FIXES)) {
    fixed = fixed.split(bad).join(good);
  }
  return fixed;
}

function fixObject(obj) {
  if (obj === null || obj === undefined) return obj;
  if (typeof obj === 'string') return fixString(obj);
  if (Array.isArray(obj)) return obj.map(fixObject);
  if (typeof obj === 'object') {
    const fixed = {};
    for (const [key, value] of Object.entries(obj)) {
      fixed[key] = fixObject(value);
    }
    return fixed;
  }
  return obj;
}

function fixLocalStorage() {
  const output = document.getElementById('output');
  output.innerHTML = '<p>Fixing localStorage...</p>';
  
  try {
    const projetos = JSON.parse(localStorage.getItem('explan_projetos') || '[]');
    if (!projetos.length) {
      output.innerHTML += '<p class="success">No projects found in localStorage.</p>';
      return;
    }
    
    let fixedCount = 0;
    const fixedProjetos = projetos.map(p => {
      const fixed = fixObject(p);
      if (JSON.stringify(fixed) !== JSON.stringify(p)) fixedCount++;
      return fixed;
    });
    
    localStorage.setItem('explan_projetos', JSON.stringify(fixedProjetos));
    output.innerHTML += `<p class="success">Fixed ${fixedCount} of ${projetos.length} projects!</p>`;
    
    // Also fix other keys that might have corrupted data
    const otherKeys = ['explan_oc', 'explan_perfil', 'explan_custom_catalog'];
    otherKeys.forEach(key => {
      try {
        const data = localStorage.getItem(key);
        if (data) {
          const parsed = JSON.parse(data);
          const fixed = fixObject(parsed);
          if (JSON.stringify(fixed) !== JSON.stringify(parsed)) {
            localStorage.setItem(key, JSON.stringify(fixed));
            output.innerHTML += `<p class="success">Also fixed ${key}</p>`;
          }
        }
      } catch (e) {}
    });
    
  } catch (e) {
    output.innerHTML += `<p class="error">Error: ${e.message}</p>`;
  }
}

function showProjects() {
  const output = document.getElementById('output');
  try {
    const projetos = JSON.parse(localStorage.getItem('explan_projetos') || '[]');
    if (!projetos.length) {
      output.innerHTML = '<p>No projects found.</p>';
      return;
    }
    output.innerHTML = '<h3>Current Projects:</h3>' + projetos.map((p, i) => `
      <div style="border:1px solid #ccc; margin:10px 0; padding:10px;">
        <strong>Project ${i+1}:</strong> ${p.cliente?.nome || 'вҖ”'} (${p.ref})<br>
        <strong>Total:</strong> R$ ${(p.total_geral || 0).toLocaleString('pt-BR', {minimumFractionDigits:2})}<br>
        <strong>Ambientes:</strong> ${(p.ambientes || []).map(a => a.nome).join(', ')}
      </div>
    `).join('');
  } catch (e) {
    output.innerHTML = `<p class="error">Error: ${e.message}</p>`;
  }
}

function clearAll() {
  if (confirm('WARNING: This will DELETE ALL saved projects! Are you sure?')) {
    localStorage.removeItem('explan_projetos');
    localStorage.removeItem('explan_oc');
    localStorage.removeItem('explan_perfil');
    localStorage.removeItem('explan_custom_catalog');
    document.getElementById('output').innerHTML = '<p class="success">All data cleared.</p>';
  }
}
</script>
</body>
</html>
