<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papéis na Equipe - Explan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2D5016;
            --bg-main: #FFFFFF;
            --bg-alt: #F5F4F0;
            --text-main: #1A1A1A;
            --text-sec: #555555;
            --cta: #3D7A1A;
            --font-title: 'Montserrat', sans-serif;
            --font-body: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-body); 
            color: var(--text-main); 
            background: var(--bg-main); 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3 { font-family: var(--font-title); }
        
        /* Fixed main logo for presentations */
        .logo { 
            position: fixed; 
            top: 40px; 
            left: 80px; 
            height: 95px; 
            width: auto; 
            z-index: 100; 
            cursor: pointer; 
            object-fit: contain;
            display: none; /* Controlled by JS */
        }
        .logo-white {
            filter: brightness(0) invert(1);
        }

        /* Menu style */
        .menu-container { 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: var(--bg-alt); 
            position: relative; 
            z-index: 90; 
            padding: 40px 24px;
        }
        .menu-logo {
            height: 90px;
            width: auto;
            object-fit: contain;
            margin-bottom: 36px;
        }
        .menu-title { 
            font-size: clamp(1.75rem, 4vw, 2.3rem); 
            color: var(--primary); 
            margin-bottom: 40px; 
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 24px; 
            max-width: 800px; 
            width: 100%; 
        }
        .menu-btn { 
            background: #fff; 
            border: 2px solid var(--primary); 
            color: var(--primary); 
            padding: 32px 24px; 
            border-radius: 12px; 
            font-size: clamp(1.15rem, 2vw, 1.45rem); 
            font-weight: bold; 
            font-family: var(--font-title); 
            cursor: pointer; 
            transition: all 0.25s ease; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .menu-btn:hover { 
            background: var(--primary); 
            color: #fff; 
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(45, 80, 22, 0.18);
        }
        .menu-btn-vg {
            background: var(--primary);
            color: #fff;
        }
        
        /* Slides layout system */
        .presentation { width: 100vw; height: 100vh; position: relative; display: none; }
        .slide { 
            width: 100vw; 
            height: 100vh; 
            position: absolute; 
            top: 0; 
            left: 0; 
            opacity: 0; 
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            display: flex; 
            flex-direction: row;
            z-index: 1; 
            pointer-events: none; 
            overflow: hidden;
        }
        .slide.active { opacity: 1; z-index: 2; pointer-events: auto; }
        
        .content-full { 
            width: 100%; 
            height: 100%;
            padding: 170px 80px 80px 80px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            overflow-y: auto;
        }
        .content-left { 
            width: 60%; 
            height: 100%;
            padding: 170px 80px 80px 80px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            overflow-y: auto;
            background: var(--bg-main);
        }
        .bg-right { 
            width: 40%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        /* Cover styling for internal presentations */
        .slide-dark {
            background-color: var(--primary);
            position: relative;
        }
        .bg-cover { 
            position: absolute; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            opacity: 0.15; 
        }
        .bg-overlay { 
            position: absolute; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--primary); 
            z-index: 0; 
        }

        h1 { 
            font-size: clamp(2.2rem, 3.8vw, 3.2rem); 
            line-height: 1.15;
            margin-bottom: 20px; 
            color: var(--primary); 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        h2 { 
            font-size: clamp(1.2rem, 1.8vw, 1.45rem); 
            line-height: 1.5;
            margin-bottom: 32px; 
            color: var(--text-sec); 
            font-weight: 400; 
        }
        p { 
            font-size: clamp(0.95rem, 1.1vw, 1.1rem); 
            line-height: 1.7; 
            color: var(--text-sec); 
            margin-bottom: 28px; 
        }
        
        .bg-alt { background-color: var(--bg-alt); }
        .text-white { color: #fff; }
        
        /* Fixed Nav controls */
        .nav-buttons { 
            position: fixed; 
            bottom: 24px; 
            right: 80px; 
            z-index: 100; 
            display: flex; 
            gap: 12px; 
        }
        .nav-btn { 
            background: var(--primary); 
            color: #fff; 
            border: none; 
            padding: 14px 28px; 
            font-family: var(--font-title); 
            font-weight: 700; 
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer; 
            border-radius: 6px; 
            box-shadow: 0 4px 16px rgba(45, 80, 22, 0.25);
            transition: all 0.2s ease;
        }
        .nav-btn:hover { 
            background: var(--cta); 
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(45, 80, 22, 0.35);
        }
        .back-menu { 
            position: fixed; 
            bottom: 24px; 
            left: 80px; 
            z-index: 100; 
            background: none; 
            color: var(--text-sec); 
            border: 1px solid rgba(0,0,0,0.15); 
            padding: 14px 28px; 
            font-family: var(--font-title); 
            font-weight: 700; 
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer; 
            border-radius: 6px; 
            background-color: rgba(255,255,255,0.9);
            box-shadow: 0 4px 16px rgba(0,0,0,0.03);
            transition: all 0.2s ease;
        }
        .back-menu:hover {
            background-color: var(--text-sec);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        /* Specific typography & UI elements for user profiles */
        .cover-name { 
            font-size: clamp(3rem, 6vw, 5rem); 
            color: #fff; 
            margin-top: 16px; 
            margin-bottom: 12px; 
            font-family: var(--font-title);
            font-weight: 700;
            letter-spacing: -1px;
        }
        .cover-tag { 
            color: rgba(255,255,255,0.75); 
            font-size: 12px; 
            letter-spacing: 2.5px; 
            text-transform: uppercase; 
            font-family: var(--font-title); 
            font-weight: 700; 
        }
        .cover-role { 
            color: #fff; 
            font-size: clamp(1.25rem, 2vw, 1.75rem); 
            font-weight: 500; 
            margin-bottom: 32px; 
        }
        .cover-line { 
            width: 80px; 
            height: 3px; 
            background: #81C784; 
            margin-bottom: 32px; 
            border-radius: 1px;
        }
        
        .big-phrase { 
            font-size: clamp(1.5rem, 2.5vw, 2.25rem); 
            font-weight: bold; 
            color: var(--primary); 
            font-family: var(--font-title); 
            max-width: 900px; 
            text-align: center; 
            margin-bottom: 28px; 
            line-height: 1.4; 
            letter-spacing: -0.2px;
        }
        
        .check-list { 
            list-style: none; 
            text-align: left; 
            max-width: 700px; 
            width: 100%; 
            margin: 0 auto; 
        }
        .check-list li { 
            font-size: clamp(0.95rem, 1.2vw, 1.1rem); 
            margin-bottom: 14px; 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            line-height: 1.6;
            color: var(--text-main);
        }
        .check-list li::before { 
            content: "✓"; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background-color: rgba(45, 80, 22, 0.08);
            color: var(--primary);
            border-radius: 50%;
            font-weight: bold;
            font-size: 13px;
            flex-shrink: 0;
        }
        
        .highlight-box { 
            background: #fff; 
            border-left: 4px solid var(--primary); 
            padding: 24px; 
            max-width: 700px; 
            margin: 28px auto 0; 
            text-align: left; 
            font-weight: 600; 
            color: var(--text-main); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); 
            font-size: 15px;
            border-top: 1px solid rgba(0,0,0,0.03);
            border-right: 1px solid rgba(0,0,0,0.03);
            border-bottom: 1px solid rgba(0,0,0,0.03);
            border-radius: 0 8px 8px 0;
        }
        .warning-box { 
            background: #FFF8E1; 
            border-left: 4px solid #F57F17; 
            padding: 24px; 
            max-width: 700px; 
            margin: 28px auto 0; 
            text-align: left; 
            color: #E65100; 
            font-weight: 600; 
            font-size: 15px;
            border-radius: 0 8px 8px 0;
        }
        
        .card-row { 
            display: flex; 
            gap: 28px; 
            justify-content: center; 
            max-width: 950px; 
            width: 100%; 
            margin-top: 36px; 
        }
        .card { 
            background: #fff; 
            padding: 32px 24px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); 
            flex: 1; 
            text-align: left; 
            border-top: 4px solid var(--primary); 
            border-left: 1px solid rgba(0,0,0,0.03);
            border-right: 1px solid rgba(0,0,0,0.03);
            border-bottom: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card-icon { font-size: 32px; margin-bottom: 16px; display: block; }
        .card h3 { font-size: 18px; color: var(--primary); margin-bottom: 10px; font-weight: 600; }
        .card p { font-size: 14px; margin-bottom: 0; line-height: 1.6; }
        
        /* Flow VG */
        .flow-vg { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            width: 100%; 
            max-width: 1150px; 
            margin-top: 36px; 
            gap: 16px;
        }
        .flow-vg-box { 
            flex: 1; 
            background: #fff; 
            padding: 24px 16px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); 
            text-align: center; 
            min-height: 170px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .flow-vg-box.green-1 { background: #f1f8e9; }
        .flow-vg-box.green-2 { background: #e8f5e9; }
        .flow-vg-box.green-3 { background: #c8e6c9; }
        .flow-vg-box.green-4 { background: #a5d6a7; }
        .flow-vg-title { 
            font-weight: 700; 
            font-family: var(--font-title); 
            color: var(--primary); 
            margin-bottom: 10px; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        .grid-vg { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 24px; 
            max-width: 1150px; 
            width: 100%; 
            margin-top: 36px; 
        }
        .card-vg { 
            background: #fff; 
            border-top: 4px solid var(--primary); 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); 
            text-align: left; 
            border-left: 1px solid rgba(0,0,0,0.03);
            border-right: 1px solid rgba(0,0,0,0.03);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        .card-vg h3 { font-size: 12px; color: var(--text-sec); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }

        /* Responsive */
        @media (max-width: 1024px) {
            .slide {
                flex-direction: column;
                overflow-y: auto;
            }
            .content-left {
                width: 100% !important;
                height: auto;
                min-height: 100%;
                padding: 120px 32px 100px 32px;
            }
            .content-full {
                height: auto;
                min-height: 100%;
                padding: 120px 32px 100px 32px;
            }
            .bg-right {
                width: 100% !important;
                height: 300px;
                order: -1;
            }
            .logo {
                top: 20px;
                left: 32px;
                height: 70px;
            }
            .back-menu {
                left: 32px;
                bottom: 32px;
            }
            .nav-buttons {
                right: 32px;
                bottom: 32px;
            }
            .card-row, .flow-vg, .grid-vg {
                flex-direction: column;
                grid-template-columns: 1fr;
                gap: 20px;
                margin-top: 24px;
            }
            .flow-vg-box {
                min-height: auto;
                padding: 18px;
            }
            .flow-vg div {
                display: none; /* Hide arrows on mobile */
            }
            .flow-vg div:first-child, .flow-vg .flow-vg-box {
                display: flex; /* Show boxes */
            }
        }
    </style>
</head>

        let currentSlides = [];
        let currentIndex = 0;

        // Inicia na tela de menu
        showMenu();

        function showMenu() {
            document.getElementById('presentation').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('main-logo').style.display = 'none';
        }

        function startPresentation(type) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('presentation').style.display = 'block';
            document.getElementById('main-logo').style.display = 'block';
            
            const container = document.getElementById('slides-container');
            container.innerHTML = presData[type].join('');
            
            currentSlides = document.querySelectorAll('#slides-container .slide');
            currentIndex = 0;
            updateSlides();
        }

        function updateSlides() {
            currentSlides.forEach((slide, i) => {
                if (i === currentIndex) slide.classList.add('active');
                else slide.classList.remove('active');
            });
            updateLogoTheme();
        }

        function updateLogoTheme() {
            const logo = document.getElementById('main-logo');
            if (!currentSlides[currentIndex]) return;
            
            const slide = currentSlides[currentIndex];
            
            if (slide.getAttribute('data-show-logo') !== 'true') {
                logo.style.display = 'none';
                return;
            }
            
            logo.style.display = 'block';
            
            const hasOverlay = slide.querySelector('.bg-cover') !== null || slide.querySelector('.bg-overlay') !== null;
            const hasDarkBg = slide.classList.contains('slide-dark') || slide.style.backgroundColor === 'var(--primary)';
            
            if (hasOverlay || hasDarkBg) {
                logo.className = "logo logo-white";
                // Aumenta tamanho da logo no encerramento (slide final)
                const isFinalSlide = currentIndex === currentSlides.length - 1 && slide.classList.contains('slide-dark');
                logo.style.height = isFinalSlide ? "140px" : "75px";
                if (isFinalSlide) {
                    logo.style.position = "static";
                    logo.style.marginBottom = "40px";
                } else {
                    logo.style.position = "fixed";
                    logo.style.marginBottom = "0px";
                }
            } else {
                logo.className = "logo";
                logo.style.height = "75px";
                logo.style.position = "fixed";
                logo.style.marginBottom = "0px";
            }
        }

        function nextSlide() {
            if (currentIndex < currentSlides.length - 1) {
                currentIndex++;
                updateSlides();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlides();
            }
        }

        // Navegação por teclado
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('presentation').style.display === 'block') {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    prevSlide();
                } else if (e.key === 'Escape') {
                    showMenu();
                }
            }
        });
    </script>
